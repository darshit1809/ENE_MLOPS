name: MLOps Pipeline — CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # EC2 MLflow URI — used only in the deploy job (SSH access required).
  # The pipeline job uses a local file-based backend (no server needed).
  EC2_MLFLOW_URI: http://16.176.132.85:5000
  MLFLOW_EXPERIMENT: customer
  DOCKER_IMAGE: customer-segmentation-api
  CONTAINER_NAME: segmentation-api
  APP_PORT: 5001

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── Job 1: API smoke tests (fast, no dataset required) ─────────────────
  test:
    name: "API Smoke Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run API smoke tests
        run: pytest tests/ -v --tb=short

  # ── Job 2: Full ML Pipeline ────────────────────────────────────────────
  pipeline:
    name: "Run ML Pipeline"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt openpyxl

      # ── Dataset acquisition (3 strategies, first match wins) ────────────
      #
      # STRATEGY 1 (recommended): Store online_retail.csv in your S3 bucket.
      #   Add secret:  DATA_URL = https://your-bucket.s3.amazonaws.com/online_retail.csv
      #
      # STRATEGY 2 (fallback):  base64-encoded .tar.gz of data/ as a GitHub secret.
      #   Add secret:  DATA_ARCHIVE_B64 = $(base64 -w0 data.tar.gz)
      #   Note: GitHub secrets max 64 KB; use this only for small datasets.
      #
      # STRATEGY 3 (auto):  Download from UCI ML Repository & convert xlsx→csv.
      #   No secret needed; requires internet access on the runner.
      # ────────────────────────────────────────────────────────────────────
      - name: Acquire dataset
        env:
          DATA_URL:          ${{ secrets.DATA_URL }}
          DATA_ARCHIVE_B64:  ${{ secrets.DATA_ARCHIVE_B64 }}
        run: |
          mkdir -p data

          if [ -n "$DATA_URL" ]; then
            echo "📥 Strategy 1: Downloading dataset from DATA_URL secret..."
            curl -fsSL "$DATA_URL" -o data/online_retail.csv
            echo "✅ Downloaded $(du -h data/online_retail.csv | cut -f1)"

          elif [ -n "$DATA_ARCHIVE_B64" ]; then
            echo "📦 Strategy 2: Restoring dataset from DATA_ARCHIVE_B64 secret..."
            echo "$DATA_ARCHIVE_B64" | base64 -d > data.tar.gz
            tar -xzf data.tar.gz
            echo "✅ Archive extracted."

          else
            echo "🌐 Strategy 3: Downloading from UCI ML Repository..."
            pip install openpyxl --quiet
            curl -fsSL \
              "https://archive.ics.uci.edu/ml/machine-learning-databases/00352/Online%20Retail.xlsx" \
              -o data/online_retail.xlsx
            echo "Converting xlsx → csv..."
            python - <<'PYEOF'
          import pandas as pd
          df = pd.read_excel("data/online_retail.xlsx", dtype=str)
          # Normalise column names to match existing scripts
          rename = {
              "Invoice":     "Invoice",
              "StockCode":   "StockCode",
              "Description": "Description",
              "Quantity":    "Quantity",
              "InvoiceDate": "InvoiceDate",
              "Price":       "Price",
              "Customer ID": "Customer ID",
              "Country":     "Country",
          }
          df.rename(columns=rename, inplace=True)
          df.to_csv("data/online_retail.csv", index=False)
          print(f"Saved {len(df):,} rows to data/online_retail.csv")
          PYEOF
            echo "✅ Converted: $(du -h data/online_retail.csv | cut -f1)"
          fi

          # Verify file exists and is non-empty
          if [ ! -s data/online_retail.csv ]; then
            echo "❌ data/online_retail.csv is missing or empty."
            exit 1
          fi

      # ── Run the full 6-step pipeline ────────────────────────────────────
      # Uses a local file-based MLflow backend (mlruns/) — no remote server
      # required. Artifacts are uploaded as GitHub Actions artifacts below.
      - name: Run ML Pipeline
        env:
          MLFLOW_TRACKING_URI: mlruns
          MLFLOW_EXPERIMENT:   ${{ env.MLFLOW_EXPERIMENT }}
        run: python run_pipeline.py

      # ── Validate all models exist in models/ ──────────────────────────────
      # models/kmeans_model.pkl → saved by train_model.py      (Step 4)
      # models/scaler.pkl       → saved by train_model.py      (Step 4)
      # models/rf_model.pkl     → saved by train_classifier.py (Step 6)
      - name: Verify exported models
        env:
          MLFLOW_TRACKING_URI: mlruns
          MLFLOW_EXPERIMENT:   ${{ env.MLFLOW_EXPERIMENT }}
        run: python scripts/export_models.py

      # ── Upload models for deploy job ─────────────────────────────────────
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 3

      # ── Upload MLflow tracking data for audit ───────────────────────────
      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 7

      # ── Upload pipeline outputs for audit ────────────────────────────────
      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            data/*.png
            data/*.csv
            data/*.txt
          retention-days: 7

  # ── Job 3: Build & Deploy to EC2 ──────────────────────────────────────
  deploy:
    name: "Build & Deploy to EC2"
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to EC2
        run: |
          rsync -avz \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'mlruns' \
            --exclude 'mlartifacts' \
            --exclude 'mlflow.db' \
            --exclude 'data/' \
            -e "ssh" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/

      - name: Build Docker image & restart container on EC2
        env:
          EC2_HOST:   ${{ secrets.EC2_HOST }}
          EC2_USER:   ${{ secrets.EC2_USER }}
          MLFLOW_URI: ${{ env.EC2_MLFLOW_URI }}
          APP_PORT:   ${{ env.APP_PORT }}
          IMAGE:      ${{ env.DOCKER_IMAGE }}
          CONTAINER:  ${{ env.CONTAINER_NAME }}
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << ENDSSH
            set -e
            cd /home/\$USER/app

            echo "==> Building Docker image: ${IMAGE}:latest"
            docker build -t ${IMAGE}:latest .

            echo "==> Stopping old container (if any)..."
            docker stop ${CONTAINER} 2>/dev/null || true
            docker rm   ${CONTAINER} 2>/dev/null || true

            echo "==> Starting new container on port ${APP_PORT}..."
            docker run -d \
              --name ${CONTAINER} \
              --restart unless-stopped \
              -p ${APP_PORT}:${APP_PORT} \
              -e MLFLOW_TRACKING_URI=${MLFLOW_URI} \
              -e PORT=${APP_PORT} \
              ${IMAGE}:latest

            echo "==> Waiting 15s for container to start..."
            sleep 15
            docker inspect --format='{{.State.Health.Status}}' ${CONTAINER} || true
            echo "==> Deployment complete!"
          ENDSSH
